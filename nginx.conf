# OPORTAL — nginx server config (mounted at /etc/nginx/conf.d/default.conf)
#
# Serves the new landing page at "/" (index.html) and routes the OPORTAL popup
# URLs (e.g. /avatar, /data, /beamin) to the portal shell (portal.html) so the
# client-side router can open the matching popup on a fresh load / bookmark.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── OPORTAL popup routes ────────────────────────────────────────────────
    # Exact single-segment paths (no trailing slash) are served by the portal
    # shell. The trailing "$" anchors the match, so the real /avatar/ folder
    # page (which has a trailing slash) is NOT captured here and keeps working.
    location ~ ^/(avatar|wallet|nft|karma|messages|search|settings|map|data|hyperdrive|onet|onode|developer|beamin|signin|signup)$ {
        try_files /portal.html =404;
    }

    # Everything else: real files, real folders (incl. /avatar/), then 404.
    location / {
        try_files $uri $uri/ =404;
    }
}
