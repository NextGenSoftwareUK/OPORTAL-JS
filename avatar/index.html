<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar | OASIS</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@200;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: radial-gradient(circle at top, rgba(107, 208, 255, 0.16), transparent 34%),
          linear-gradient(180deg, #07111a 0%, #050b12 100%);
        --card-bg: rgba(8, 18, 29, 0.9);
        --card-border: rgba(134, 215, 255, 0.16);
        --text-main: #edf6ff;
        --text-muted: #a9bac9;
        --accent: #6bd0ff;
        --accent-strong: #00e5ff;
      }

      * {
        box-sizing: border-box;
      }

      body.avatar-page {
        margin: 0;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--text-main);
        font-family: 'Titillium Web', system-ui, sans-serif;
        overflow-y: auto;
      }

      .avatar-shell {
        min-height: 100vh;
        display: block;
        padding: 32px 20px 48px;
      }

      .avatar-card {
        width: min(100%, 960px);
        border-radius: 30px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        box-shadow: 0 28px 100px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(16px);
        padding: 34px;
        margin: 0 auto;
      }

      .avatar-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 26px;
      }

      .avatar-brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .avatar-brand img {
        width: 74px;
        height: 74px;
        padding: 8px;
        border-radius: 18px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.08;
        font-weight: 600;
      }

      .lead {
        margin: 14px 0 0;
        color: var(--text-muted);
        font-size: 1.05rem;
        line-height: 1.6;
        max-width: 760px;
      }

      .avatar-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        border: 0;
        text-decoration: none;
        font-weight: 700;
        color: #04111a;
        background: linear-gradient(135deg, #9be2ff 0%, #63cdf8 100%);
        box-shadow: 0 18px 34px rgba(54, 164, 218, 0.24);
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 0 1px rgba(155, 226, 255, 0.35), 0 22px 42px rgba(99, 205, 248, 0.34),
          0 0 26px rgba(107, 208, 255, 0.22);
        filter: brightness(1.05);
      }

      .button:focus-visible {
        outline: 2px solid rgba(155, 226, 255, 0.65);
        outline-offset: 3px;
      }

      .button--ghost {
        color: var(--text-main);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: none;
      }

      .avatar-grid {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 20px;
        margin-top: 28px;
      }

      .avatar-panel {
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        padding: 22px;
      }

      .avatar-summary {
        display: grid;
        gap: 14px;
      }

      .summary-avatar {
        display: grid;
        place-items: center;
        padding: 18px;
        border-radius: 22px;
        background: radial-gradient(circle at top, rgba(107, 208, 255, 0.18), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(107, 208, 255, 0.14);
      }

      .summary-avatar img {
        width: 110px;
        height: 110px;
        object-fit: contain;
      }

      .summary-name {
        text-align: center;
      }

      .summary-name h2 {
        margin: 0 0 6px;
        font-size: 1.35rem;
      }

      .summary-name p {
        margin: 0;
        color: var(--text-muted);
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(107, 208, 255, 0.08);
        border: 1px solid rgba(107, 208, 255, 0.14);
        color: #dff8ff;
        font-size: 0.95rem;
      }

      .detail-list {
        display: grid;
        gap: 14px;
      }

      .detail-row {
        display: grid;
        gap: 6px;
      }

      .detail-label {
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .detail-value {
        font-size: 1.05rem;
        color: var(--text-main);
        word-break: break-word;
      }

      .mode-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .mode-head h2 {
        margin: 0;
        font-size: 1.4rem;
      }

      .mode-head p {
        margin: 6px 0 0;
        color: var(--text-muted);
      }

      .edit-form {
        display: grid;
        gap: 16px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-weight: 700;
        color: var(--text-main);
      }

      .field input {
        width: 100%;
        min-height: 52px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-main);
        padding: 0 16px;
        font: inherit;
      }

      .field input:focus {
        outline: 2px solid rgba(107, 208, 255, 0.4);
        outline-offset: 2px;
      }

      .status-card {
        margin-top: 22px;
        padding: 20px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        min-height: 108px;
      }

      .status-card h3 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }

      .status-card p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.65;
      }

      .status-card--success {
        border-color: rgba(103, 211, 154, 0.35);
      }

      .status-card--error {
        border-color: rgba(255, 141, 141, 0.35);
      }

      .status-card--loading {
        border-color: rgba(107, 208, 255, 0.28);
      }

      .status-card--neutral {
        border-color: rgba(255, 255, 255, 0.08);
      }

      .status-loading-line {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }

      .status-spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid rgba(155, 226, 255, 0.28);
        border-top-color: #6bd0ff;
        vertical-align: -2px;
        animation: spinner-spin 0.8s linear infinite;
      }

      @keyframes spinner-spin {
        to {
          transform: rotate(360deg);
        }
      }

      [hidden] {
        display: none !important;
      }

      .footer-row {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      @media (max-width: 860px) {
        .avatar-grid {
          grid-template-columns: 1fr;
        }

        .avatar-actions {
          justify-content: flex-start;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="avatar-page">
    <main class="avatar-shell">
      <section class="avatar-card">
        <div class="avatar-top">
          <div class="avatar-brand">
            <!-- <img src="../assets/img/OASISLogoEmail.jpg" alt="OASIS" /> -->
            <div>
              <!-- <p class="eyebrow">Avatar</p> -->
              <h1 id="avatar-mode-title">View Avatar</h1>
              <p class="lead" id="avatar-mode-subtitle">Your current avatar profile and account information.</p>
            </div>
          </div>
          <div class="avatar-actions">
            <a class="button button--ghost" href="/">Back to portal</a>
            <button id="avatar-toggle-edit" class="button" type="button">Edit avatar</button>
            <button id="avatar-cancel" class="button button--ghost" type="button" hidden>Cancel</button>
            <button id="avatar-save" class="button" type="button" hidden>Save changes</button>
          </div>
        </div>

        <div id="avatar-view">
          <div class="avatar-grid">
            <aside class="avatar-panel avatar-summary">
              <div class="summary-avatar">
                <img id="avatar-image" src="../assets/img/loggedout.png" alt="Avatar" />
              </div>
              <div class="summary-name">
                <h2 data-avatar-field="displayName">Avatar</h2>
                <p data-avatar-field="username">Not set</p>
              </div>
              <div class="chip-row">
                <span class="chip" data-avatar-field="avatarType">User</span>
                <span class="chip" data-avatar-field="email">Not set</span>
              </div>
            </aside>

            <div class="avatar-panel">
              <div class="detail-list">
                <div class="detail-row">
                  <div class="detail-label">Title</div>
                  <div class="detail-value" data-avatar-field="title">Not set</div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">First Name</div>
                  <div class="detail-value" data-avatar-field="firstName">Not set</div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">Last Name</div>
                  <div class="detail-value" data-avatar-field="lastName">Not set</div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">Email</div>
                  <div class="detail-value" data-avatar-field="email">Not set</div>
                </div>
                <div class="detail-row">
                  <div class="detail-label">Address</div>
                  <div class="detail-value" data-avatar-field="address">Not set</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="avatar-edit" hidden>
          <div class="avatar-panel">
            <div class="mode-head">
              <div>
                <h2>Edit your avatar</h2>
                <p>Update your profile fields and save the changes back to OASIS.</p>
              </div>
            </div>

            <form class="edit-form" onsubmit="return false">
              <div class="field-grid">
                <div class="field">
                  <label for="avatar-title">Title</label>
                  <input id="avatar-title" type="text" autocomplete="honorific-prefix" placeholder="Dr" />
                </div>
                <div class="field">
                  <label for="avatar-firstName">First Name</label>
                  <input id="avatar-firstName" type="text" autocomplete="given-name" placeholder="John" />
                </div>
              </div>

              <div class="field-grid">
                <div class="field">
                  <label for="avatar-lastName">Last Name</label>
                  <input id="avatar-lastName" type="text" autocomplete="family-name" placeholder="Doe" />
                </div>
                <div class="field">
                  <label for="avatar-username">Username</label>
                  <input id="avatar-username" type="text" autocomplete="username" placeholder="johndoe" />
                </div>
              </div>

              <div class="field-grid">
                <div class="field">
                  <label for="avatar-email">Email</label>
                  <input id="avatar-email" type="email" autocomplete="email" placeholder="name@example.com" />
                </div>
                <div class="field">
                  <label for="avatar-address">Address</label>
                  <input id="avatar-address" type="text" placeholder="Optional" />
                </div>
              </div>
            </form>
          </div>
        </div>

        <!-- <div id="avatar-status" class="status-card avatar-status avatar-status--neutral" aria-live="polite">
          <h3>Loading avatar</h3>
          <p>We are checking your saved profile details.</p>
        </div>

        <div class="footer-row">
          <span>Changes are saved to your avatar profile.</span>
          <span>If the edit button does not work, sign in first.</span>
        </div> -->
      </section>
    </main>
    <script src="../assets/js/config.js?v=20260528"></script>
    <script src="../assets/js/avatar-page.js?v=20260528"></script>
  </body>
</html>
