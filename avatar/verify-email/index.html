<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email | OASIS</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: radial-gradient(circle at top, rgba(66, 179, 255, 0.26), transparent 34%),
          linear-gradient(180deg, #07131f 0%, #061018 100%);
        --card-bg: rgba(8, 18, 29, 0.88);
        --card-border: rgba(134, 215, 255, 0.16);
        --text-main: #edf6ff;
        --text-muted: #a9bac9;
        --accent: #6bd0ff;
        --success: #67d39a;
        --error: #ff8d8d;
      }

      * {
        box-sizing: border-box;
      }

      body.recovery-page {
        margin: 0;
        min-height: 100vh;
        font-family: 'Titillium Web', system-ui, sans-serif;
        background: var(--page-bg);
        color: var(--text-main);
      }

      .recovery-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .recovery-card {
        width: min(100%, 640px);
        padding: 36px;
        border-radius: 28px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand img {
        width: 84px;
        height: 84px;
        padding: 8px;
        border-radius: 20px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.1;
        letter-spacing: -0.01em;
        text-rendering: optimizeLegibility;
      }

      .lead {
        margin: 16px 0 0;
        color: var(--text-muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .status-card {
        margin-top: 28px;
        padding: 20px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .status-card h2 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }

      .status-card p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.65;
      }

      .status-spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        margin-left: 10px;
        border-radius: 50%;
        border: 2px solid rgba(155, 226, 255, 0.28);
        border-top-color: var(--accent);
        vertical-align: -2px;
        animation: spinner-spin 0.8s linear infinite;
      }

      @keyframes spinner-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-card--loading {
        border-color: rgba(107, 208, 255, 0.28);
      }

      .status-card--success {
        border-color: rgba(103, 211, 154, 0.35);
      }

      .status-card--error {
        border-color: rgba(255, 141, 141, 0.35);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        color: #04111a;
        background: linear-gradient(135deg, #9be2ff 0%, #63cdf8 100%);
        box-shadow: 0 18px 34px rgba(54, 164, 218, 0.24);
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 0 1px rgba(155, 226, 255, 0.35), 0 22px 42px rgba(99, 205, 248, 0.34),
          0 0 26px rgba(107, 208, 255, 0.22);
        filter: brightness(1.05);
      }

      .button:focus-visible {
        outline: 2px solid rgba(155, 226, 255, 0.65);
        outline-offset: 3px;
      }

      .button--ghost {
        color: var(--text-main);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: none;
      }
    </style>
  </head>
  <body class="recovery-page">
    <main class="recovery-shell">
      <section class="recovery-card">
        <div class="brand">
          <img src="../../assets/img/OASISLogoEmail.jpg" alt="OASIS" />
          <div>
            <p class="eyebrow">Account verification</p>
            <h1>Verify your email</h1>
          </div>
        </div>
        <p class="lead">
          We are checking the verification token from your email link. Once it is confirmed, you can return to the
          portal and sign in.
        </p>
        <div id="verify-status" class="status-card" aria-live="polite">
          <h2>Checking token</h2>
          <p>Please wait while we contact the OASIS API.</p>
        </div>
        <div class="actions">
          <a class="button" href="/">Return to portal</a>
        </div>
      </section>
    </main>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/account-recovery.js"></script>
  </body>
</html>
