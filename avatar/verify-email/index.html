<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — OASIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@200;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(circle at top, rgba(66, 179, 255, 0.26), transparent 34%),
        linear-gradient(180deg, #07131f 0%, #061018 100%);
      color: #e0e0e0;
      font-family: 'Titillium Web', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #060d1f;
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
    }

    .logo {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      color: #a8bfd8;
      opacity: .7;
      text-decoration: none;
      display: block;
      margin-bottom: 32px;
    }

    .eyebrow {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #6bd0ff;
      margin-bottom: 8px;
    }

    h1 {
      color: #00e5ff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #a8bfd8;
      font-size: .875rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .status {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: .85rem;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      margin-bottom: 24px;
    }
    .status__title {
      font-weight: 700;
      font-size: .88rem;
      margin-bottom: 4px;
    }
    .status__msg { color: #a8bfd8; margin: 0; }

    .status--loading { border-color: rgba(107,208,255,.25); }
    .status--loading .status__title { color: #6bd0ff; }
    .status--success { border-color: rgba(103,211,154,.32); background: rgba(103,211,154,.04); }
    .status--success .status__title { color: #5de6a0; }
    .status--error   { border-color: rgba(255,100,100,.28); background: rgba(255,60,60,.05); }
    .status--error   .status__title { color: #ff7070; }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(107,208,255,.25);
      border-top-color: #6bd0ff;
      border-radius: 50%;
      vertical-align: -2px; margin-left: 8px;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 24px;
      border-radius: 8px;
      border: 1px solid rgba(0,229,255,.35);
      background: rgba(0,229,255,.08);
      color: #00e5ff;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .05em;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn:hover {
      background: rgba(0,229,255,.15);
      border-color: rgba(0,229,255,.6);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 28px 0 20px;
    }

    .footer-note {
      color: #a8bfd8;
      font-size: .75rem;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="https://oportal.oasisomniverse.one">OPORTAL HOME</a>

    <p class="eyebrow">Account verification</p>
    <h1>Verify your email</h1>
    <p class="subtitle">We're checking the verification token from your email link. Once confirmed you can return to the portal and sign in.</p>

    <div class="status status--loading" id="status-box">
      <div class="status__title">Verifying<span class="spinner"></span></div>
      <p class="status__msg">Contacting the OASIS API…</p>
    </div>

    <a class="btn" href="https://oportal.oasisomniverse.one/">Return to portal</a>

    <hr class="divider">
    <p class="footer-note">Questions? Join us on <a href="https://t.me/oasisweb4chat" style="color:#00e5ff88;text-decoration:none">Telegram</a></p>
  </div>

  <script src="../../assets/js/config.js?v=20260528"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var token = params.get('token') || '';
      var box = document.getElementById('status-box');

      function setStatus(type, title, msg) {
        box.className = 'status status--' + type;
        box.querySelector('.status__title').innerHTML =
          title + (type === 'loading' ? '<span class="spinner"></span>' : '');
        box.querySelector('.status__msg').textContent = msg;
      }

      if (!token) {
        setStatus('error', 'Missing token', 'The verification link is missing its token. Please use the link from your email.');
        return;
      }

      fetch((window.apiUrl || 'https://api.web4.oasisomniverse.one') + '/api/avatar/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      })
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
      .then(function (r) {
        var msg = r.data?.result?.message || r.data?.message || '';
        if (r.ok) {
          setStatus('success', 'Email verified', msg || 'Email verified successfully. Click Return to portal when you are ready.');
        } else {
          setStatus('error', 'Verification failed', msg || 'The link may have expired. Please request a new verification email from your account settings.');
        }
      })
      .catch(function () {
        setStatus('error', 'Network error', 'Could not reach the server. Please check your connection and try again.');
      });
    })();
  </script>
</body>
</html>
