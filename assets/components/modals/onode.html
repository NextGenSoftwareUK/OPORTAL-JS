<div class="modal__block js-modal-block onode-modal-block" data-type="onode" id="onode-modal-block">
  <section class="onode-modal-shell" aria-label="ONODE">
    <div class="onode-modal-card">

      <div class="onode-modal-top">
        <div>
          <h1 class="onode-modal-title">ONODE — My Node</h1>
          <p class="onode-modal-lead">Monitor and manage your local OASIS Node (ONODE) on the ONET.</p>
        </div>
        <button id="onode-close-btn" class="modal-close-btn" type="button" aria-label="Close">&#x2715;</button>
      </div>

      <!-- Status banner -->
      <div id="onode-status-banner" class="hd-mode-banner hd-mode-banner--offline">
        <div class="hd-mode-banner-left">
          <div id="onode-status-dot" class="hd-mode-dot hd-mode-dot--offline"></div>
          <div>
            <div id="onode-status-label" class="hd-mode-label">UNKNOWN</div>
            <div id="onode-status-desc" class="hd-mode-desc">Fetching node status…</div>
          </div>
        </div>
        <button id="onode-refresh-btn" class="hd-pill-btn" type="button">⟳ Refresh</button>
      </div>

      <!-- Stats bar -->
      <div class="onode-stats-bar">
        <div class="onode-stat-block">
          <div class="onode-stat-label">Status</div>
          <div class="onode-stat-value" id="onode-stat-status">—</div>
        </div>
        <div class="onode-stat-block">
          <div class="onode-stat-label">Uptime</div>
          <div class="onode-stat-value" id="onode-stat-uptime">—</div>
        </div>
        <div class="onode-stat-block">
          <div class="onode-stat-label">Peers</div>
          <div class="onode-stat-value" id="onode-stat-peers">—</div>
        </div>
        <div class="onode-stat-block">
          <div class="onode-stat-label">Version</div>
          <div class="onode-stat-value" id="onode-stat-version">—</div>
        </div>
      </div>

      <div id="onode-modal-status" class="onode-status" hidden></div>

      <!-- Tabs -->
      <div class="onode-tabs">
        <button class="onode-tab is-active" data-tab="overview">Overview</button>
        <button class="onode-tab" data-tab="metrics">Metrics</button>
        <button class="onode-tab" data-tab="logs">Logs</button>
        <button class="onode-tab" data-tab="peers">Peers</button>
        <button class="onode-tab" data-tab="config">Config</button>
        <button class="onode-tab" data-tab="oasisdna">OASISDNA</button>
      </div>

      <!-- Overview -->
      <div id="onode-tab-overview" class="onode-tab-panel">
        <div id="onode-info-grid" class="onode-info-grid">
          <div class="onode-empty"><div class="onode-empty-icon">🖥️</div><p>Loading node information…</p></div>
        </div>
      </div>

      <!-- Metrics -->
      <div id="onode-tab-metrics" class="onode-tab-panel" hidden>
        <div id="onode-metrics-grid" class="onode-metrics-grid">
          <div class="onode-empty"><p>No metrics available.</p></div>
        </div>
      </div>

      <!-- Logs -->
      <div id="onode-tab-logs" class="onode-tab-panel" hidden>
        <div class="onode-logs-toolbar">
          <button id="onode-clear-logs-btn" class="button button--ghost" type="button" style="font-size:0.8rem;padding:4px 12px;">Clear</button>
        </div>
        <div id="onode-logs" class="onode-log-viewer">Waiting for logs…</div>
      </div>

      <!-- Peers -->
      <div id="onode-tab-peers" class="onode-tab-panel" hidden>
        <div id="onode-peers-list" class="onode-peers-list">
          <div class="onode-empty"><div class="onode-empty-icon">🔗</div><p>No peers connected.</p></div>
        </div>
      </div>

      <!-- Config -->
      <div id="onode-tab-config" class="onode-tab-panel" hidden>
        <pre id="onode-config" class="onode-preformatted onode-preformatted--scroll">Loading config…</pre>
      </div>

      <!-- OASISDNA -->
      <div id="onode-tab-oasisdna" class="onode-tab-panel" hidden>
        <pre id="onode-oasisdna" class="onode-preformatted onode-preformatted--scroll">Loading OASIS DNA…</pre>
      </div>

      <!-- Node controls (always visible) -->
      <div class="onode-controls">
        <button id="onode-start-btn" class="button button--ghost onode-ctrl-btn" type="button">Start</button>
        <button id="onode-stop-btn" class="button button--ghost onode-ctrl-btn" type="button">Stop</button>
        <button id="onode-restart-btn" class="button button--ghost onode-ctrl-btn" type="button">Restart</button>
      </div>

    </div>
  </section>
</div>
