<div class="modal__block js-modal-block avatar-modal-block" data-type="avatar" id="avatar-modal-block">
  <section class="avatar-modal-shell" aria-label="Avatar details">
    <div class="avatar-modal-card">
      <div class="avatar-modal-top">
        <div class="avatar-modal-brand">
          <div>
            <h1 id="avatar-modal-title">View Avatar</h1>
            <p class="avatar-modal-lead" id="avatar-modal-subtitle">Your current avatar profile and account information.</p>
          </div>
        </div>
        <div class="avatar-modal-actions">
          <button id="avatar-modal-close-btn" class="button button--ghost" type="button">Close</button>
          <button id="avatar-modal-edit-btn" class="button" type="button">Edit avatar</button>
          <button id="avatar-modal-cancel-btn" class="button button--ghost" type="button" hidden>Cancel</button>
          <button id="avatar-modal-save-btn" class="button" type="button" hidden>Save changes</button>
        </div>
      </div>

      <div id="avatar-modal-view">
        <div class="avatar-modal-grid">
          <aside class="avatar-modal-panel avatar-modal-summary">
            <div class="avatar-modal-summary-avatar">
              <img id="avatar-modal-image-large" src="assets/img/loggedin.png" alt="Avatar" />
            </div>
            <div class="summary-name">
              <h2 data-avatar-modal-field="username">Avatar</h2>
            </div>
            <div class="summary-name">
              <p data-avatar-modal-field="karma"><b>Karma: 777</b></p>
              <p data-avatar-modal-field="xp">XP: 777</p>
            </div>
          </aside>

          <div class="avatar-modal-panel">
            <div class="detail-list avatar-modal-detail-list">
              <div class="detail-row">
                <div class="detail-label">Title</div>
                <div class="detail-value" data-avatar-modal-field="title">Not set</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">First Name</div>
                <div class="detail-value" data-avatar-modal-field="firstName">Not set</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Last Name</div>
                <div class="detail-value" data-avatar-modal-field="lastName">Not set</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Email</div>
                <div class="detail-value" data-avatar-modal-field="email">Not set</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Address</div>
                <div class="detail-value" data-avatar-modal-field="address">Not set</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="avatar-modal-edit" hidden>
        <div class="avatar-modal-panel">
          <div class="mode-head">
            <div>
              <h2>Edit your avatar</h2>
              <p>Update your profile fields and save the changes back to OASIS.</p>
            </div>
          </div>

          <form class="edit-form" onsubmit="return false">
            <div class="field-grid">
              <div class="field">
                <label for="avatar-modal-title-input">Title</label>
                <input id="avatar-modal-title-input" type="text" autocomplete="honorific-prefix" placeholder="Dr" />
              </div>
              <div class="field">
                <label for="avatar-modal-firstName">First Name</label>
                <input id="avatar-modal-firstName" type="text" autocomplete="given-name" placeholder="John" />
              </div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="avatar-modal-lastName">Last Name</label>
                <input id="avatar-modal-lastName" type="text" autocomplete="family-name" placeholder="Doe" />
              </div>
              <div class="field">
                <label for="avatar-modal-username">Username</label>
                <input id="avatar-modal-username" type="text" autocomplete="username" placeholder="johndoe" />
              </div>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="avatar-modal-email">Email</label>
                <input id="avatar-modal-email" type="email" autocomplete="email" placeholder="name@example.com" />
              </div>
              <div class="field">
                <label for="avatar-modal-address">Address</label>
                <input id="avatar-modal-address" type="text" placeholder="Optional" />
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </section>
</div>
